name: orika-live-data
version: 1.2.0
description: "Orika CLI live data plugin. Connects to Orika WebSocket, stays live, keeps orders/deals/positions in memory, and exposes current state through JSON/CSV/query tools. Credentials stay in local .env files."
author: Dipen / Hermes Agent
kind: general
provides_tools:
  - orika_stream_start
  - orika_stream_status
  - orika_stream_query
  - orika_stream_stop
